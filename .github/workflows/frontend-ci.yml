name: Frontend CI

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: apps/web
        run: npm install

      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Build
        working-directory: apps/web
        run: npm run build
